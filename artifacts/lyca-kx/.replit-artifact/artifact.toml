kind = "web"
previewPath = "/"
title = "Lyca Mobile KX Platform"
version = "1.0.0"
id = "artifacts/lyca-kx"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20156

[services.development]
run = "pnpm --filter @workspace/lyca-kx run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lyca-kx", "run", "build" ]
publicDir = "artifacts/lyca-kx/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20156"
BASE_PATH = "/"
